site_name: "H → WW NanoAOD Analysis"
site_description: "Documentation for the H→WW NanoAOD analysis — HSF-India project"
site_url: https://h-to-ww-nanoaod-analysis.readthedocs.io/
repo_url: https://github.com/anujraghav252/H-to-WW-NanoAOD-analysis
repo_name: anujraghav252/H-to-WW-NanoAOD-analysis
copyright: "2026, HSF-India Project. Written by <a href='https://github.com/anujraghav252' target='_blank'>Anuj Raghav</a>."
site_author: "Anuj Raghav"

# .md-grid: { max-width: 1440px; }
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/atom
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs.sticky
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
    - navigation.footer
    - content.tooltips
    - content.tabs.link
    - header.autohide

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      include_markdown: true
  # - social
  # - mkdocs-pdf
  # - git-revision-date-localized:
  #     locale: en
  #     type: timeago

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - docs
  - mkdocs.yml

nav:
  - Introduction: index.md
  - Getting Started:
      - Installation & Setup: getting-started/installation.md
      - Repository Architecture: getting-started/repository-structure.md
  - Theory:
      - CMS Open Data: theory/cms-opendata.md
      - Higgs Phenomenology: theory/higgs-physics.md
      - Signal and background processes: theory/signal-and-background.md
  - Datasets: datasets/data-and-mc.md
  - Software Framework: software/ecosystem.md
  - Analysis Walkthrough:
      - Process Flowchart: analysis/flowchart.md
      - Analysis notebook: analysis/HWW_analysis.ipynb
  - Statistical Inference: combine/statistical-inference.md
