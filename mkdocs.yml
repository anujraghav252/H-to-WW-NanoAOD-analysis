site_name: "H → WW NanoAOD Analysis"
site_description: "Documentation for the H→WW NanoAOD analysis — HSF-India project"
site_url: https://h-to-ww-nanoaod-analysis.readthedocs.io/
repo_url: https://github.com/anrghv/H-to-WW-NanoAOD-analysis
repo_name: anrghv/H-to-WW-NanoAOD-analysis
copyright: "2026, HSF-India Project. Written by <a href='https://anrghv.github.io/' target='_blank'>Anuj Raghav</a>."
site_author: "Anuj Raghav"

# .md-grid: { max-width: 1440px; }
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/atom
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs.sticky
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
    - toc.integrate
    - navigation.footer
    - content.tooltips
    - content.tabs.link
    - header.autohide

plugins:
  - search
  - git-revision-date-localized:
      type: timeago
      locale: en
  - mkdocs-jupyter:
      execute: false
      ignore_h1: true
      include_source: false
      no_input: false
      include_markdown: true
      remove_tag_config:
        remove_input_tags:
          - hide_input
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - docs
  - mkdocs.yml

nav:
  - Introduction: index.md
  - Getting Started:
      - Installation & Setup: getting-started/installation.md
  - Theory:
      - CMS Open Data: theory/cms-opendata.md
      - Higgs Phenomenology: theory/higgs-physics.md
      - Signal and background processes: theory/signal-and-background.md
  - Datasets: datasets/data-and-mc.md
  - Software Framework:
      - Ecosystem: software/ecosystem.md
      - Compute Environment: software/environment.md
  - Analysis:
      - Methodology: analysis/methodology.md
      - Analysis notebook: analysis/HWW_analysis.ipynb
  - Statistical Inference: combine/statistical-inference.md
