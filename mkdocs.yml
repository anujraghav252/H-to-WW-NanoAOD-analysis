site_name: "H → WW NanoAOD Analysis"
site_description: "Documentation for the H→WW NanoAOD analysis — HSF-India project"
site_url: https://h-to-ww-nanoaod-analysis.readthedocs.io/
repo_url: https://github.com/anujraghav252/H-to-WW-NanoAOD-analysis
repo_name: anujraghav252/H-to-WW-NanoAOD-analysis
# copyright: "2026, HSF-India Project. Written by [Anuj Raghav](https://github.com/anujraghav252)."
copyright: "2026, HSF-India Project. Written by <a href='https://github.com/anujraghav252' target='_blank'>Anuj Raghav</a>."
# author: "Anuj Raghav"

# # .md-grid: { max-width: 1440px; }
# extra_css:
#   - stylesheets/extra.css

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs.sticky
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
    - navigation.footer

plugins:
  - search
  # - git-revision-date-localized:
  #     locale: en
  #     type: timeago

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Running the Analysis: getting-started/running.md
  - Theory:
      - Analysis Walkthrough: theory/walkthrough.md
  - Analysis:
      - Physics Cuts: analysis/physics-cuts.md
  - Datasets:
      - MC Samples: datasets/mc-samples.md
  - Contributing: contributing.md
